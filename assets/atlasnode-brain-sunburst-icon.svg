<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">AtlasNode brain to sunburst icon</title>
  <desc id="desc">A stylized brain on the left transitions into a radial sunburst and network visualization on the right.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbf7f0"/>
      <stop offset="55%" stop-color="#efe6d7"/>
      <stop offset="100%" stop-color="#d8e6e2"/>
    </linearGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f463f"/>
      <stop offset="100%" stop-color="#347f6f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7db8ac"/>
      <stop offset="100%" stop-color="#c45e33"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#5e5143" flood-opacity="0.18"/>
    </filter>
    <clipPath id="badge">
      <circle cx="256" cy="256" r="220"/>
    </clipPath>
  </defs>

  <circle cx="256" cy="256" r="220" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>
